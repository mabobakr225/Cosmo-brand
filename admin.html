<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة إدارة Cosmo | الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --main: #8b3a5a; --bg: #fdf6f0; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; }
        nav { background: var(--main); color: white; padding: 15px; display: flex; gap: 15px; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
        nav span { cursor: pointer; padding: 8px 15px; border-radius: 8px; white-space: nowrap; }
        .active-tab { background: rgba(255,255,255,0.3); font-weight: bold; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); display: none; margin-bottom: 20px; }
        .show { display: block; }
        input, textarea, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { background: var(--main); color: white; border: none; padding: 12px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 0.9rem; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
        .p-item { border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<nav id="adminNav" style="display:none;">
    <span onclick="showTab('productsTab', this)" class="active-tab">📦 المنتجات</span>
    <span onclick="showTab('ordersTab', this)">📝 الأوردرات</span>
    <span onclick="showTab('galleryTab', this)">🖼️ المعرض</span>
    <span onclick="showTab('settingsTab', this)">⚙️ الإعدادات</span>
</nav>

<div class="container">
    <div id="loginCard" class="card show" style="text-align: center;">
        <h2>🔐 دخول الإدارة</h2>
        <input type="password" id="loginPass" placeholder="كلمة المرور">
        <button onclick="login()">دخول</button>
    </div>

    <div id="productsTab" class="card">
        <h3>➕ إضافة/تعديل باقة</h3>
        <div class="grid-2">
            <input id="pName" placeholder="اسم الباقة">
            <input id="pPrice" type="number" placeholder="السعر">
        </div>
        <div class="grid-2">
            <input id="pImg" placeholder="رابط الصورة">
            <input id="pPoints" type="number" placeholder="نقاط المكافأة (مثلاً: 50)">
        </div>
        <select id="pCat">
            <option value="hair">عناية بالشعر (تساقط/قشرة)</option>
            <option value="skin">عناية بالبشرة (جفاف/حبوب)</option>
            <option value="all">باقة شاملة</option>
        </select>
        <textarea id="pContent" placeholder="محتويات الباقة (شامبو، زيت...)"></textarea>
        <textarea id="pTip" placeholder="💡 نصيحة الخبير (تظهر للعميل كإرشاد طبي)"></textarea>
        <textarea id="pDetails" placeholder="تفاصيل للـ AI (الكلمات المفتاحية للبحث)"></textarea>
        <button onclick="saveProduct()">حفظ الباقة</button>
        <div id="pList" style="margin-top:20px;"></div>
    </div>

    <div id="ordersTab" class="card">
        <h3>📋 سجل الطلبات والنقاط</h3>
        <table>
            <thead><tr><th>العميل</th><th>المنتج</th><th>النقاط</th><th>الحالة</th></tr></thead>
            <tbody id="ordersList"></tbody>
        </table>
    </div>

    <div id="galleryTab" class="card">
        <h3>🖼️ إضافة نتائج (قبل وبعد)</h3>
        <input id="gTitle" placeholder="عنوان النتيجة (مثلاً: علاج تساقط خلال شهر)">
        <div class="grid-2">
            <input id="gBefore" placeholder="رابط صورة (قبل)">
            <input id="gAfter" placeholder="رابط صورة (بعد)">
        </div>
        <button onclick="saveGallery()">إضافة للمعرض</button>
        <div id="gList"></div>
    </div>

    <div id="settingsTab" class="card">
        <h3>⚙️ إعدادات المتجر</h3>
        <input id="setWA" placeholder="رقم الواتساب (201xxx)">
        <input id="setPass" placeholder="باسورد الإدارة الجديد">
        <button onclick="saveSettings()">تحديث</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBDUzmVCOB9HK_g5iB4wm_UAjw0jAvhr8k",
        authDomain: "cosmo-brand.firebaseapp.com",
        projectId: "cosmo-brand",
        storageBucket: "cosmo-brand.firebasestorage.app",
        messagingSenderId: "12821155095",
        appId: "1:12821155095:web:af55925a7914027f9a7b52"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    let config = { pass: "1234", wa: "201125696178" };

    db.collection("settings").doc("main").onSnapshot(d => { if(d.exists) config = d.data(); });

    function login() {
        if(document.getElementById('loginPass').value === config.pass) {
            document.getElementById('loginCard').classList.remove('show');
            document.getElementById('adminNav').style.display = 'flex';
            showTab('productsTab', document.querySelector('nav span'));
            loadData();
        } else { alert("كلمة المرور خطأ"); }
    }

    function showTab(id, el) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('show'));
        document.querySelectorAll('nav span').forEach(s => s.classList.remove('active-tab'));
        document.getElementById(id).classList.add('show');
        el.classList.add('active-tab');
    }

    async function saveProduct() {
        const data = {
            name: document.getElementById('pName').value,
            price: document.getElementById('pPrice').value,
            points: document.getElementById('pPoints').value,
            imageUrl: document.getElementById('pImg').value,
            category: document.getElementById('pCat').value,
            content: document.getElementById('pContent').value,
            expertTip: document.getElementById('pTip').value,
            details: document.getElementById('pDetails').value,
            createdAt: new Date()
        };
        await db.collection("products").add(data);
        alert("تم الحفظ!");
    }

    async function saveGallery() {
        await db.collection("gallery").add({
            title: document.getElementById('gTitle').value,
            before: document.getElementById('gBefore').value,
            after: document.getElementById('gAfter').value
        });
        alert("تمت الإضافة للمعرض");
    }

    function loadData() {
        // تحميل المنتجات للحذف والتعديل
        db.collection("products").onSnapshot(snap => {
            let h = '';
            snap.forEach(d => {
                h += `<div class="p-item"><span>${d.data().name}</span> <button onclick="db.collection('products').doc('${d.id}').delete()" style="background:red; padding:3px 8px;">حذف</button></div>`;
            });
            document.getElementById('pList').innerHTML = h;
        });

        // تحميل الأوردرات
        db.collection("orders").orderBy("date","desc").onSnapshot(snap => {
            let h = '';
            snap.forEach(d => {
                const o = d.data();
                h += `<tr><td>${o.clientName}</td><td>${o.productName}</td><td>${o.pointsEarned || 0}</td><td>${o.status}</td></tr>`;
            });
            document.getElementById('ordersList').innerHTML = h;
        });
    }

    async function saveSettings() {
        await db.collection("settings").doc("main").set({
            wa: document.getElementById('setWA').value,
            pass: document.getElementById('setPass').value
        });
        alert("تم التحديث");
    }
</script>
</body>
</html>
