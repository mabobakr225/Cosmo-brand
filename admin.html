<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmo Brand | لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root { --deep:#8b3a5a; --gold:#c9a84c; --dark:#1a0a10; --bg:#f5e6ea; }
    body { font-family: 'Tajawal', sans-serif; background: var(--bg); margin: 0; }
    nav { background: var(--dark); color: white; padding: 15px; display: flex; gap: 15px; position: sticky; top: 0; z-index: 100; }
    nav span { cursor: pointer; padding: 8px 15px; border-radius: 8px; transition: 0.3s; }
    .active-tab, nav span:hover { background: var(--deep); }
    .container { padding: 20px; max-width: 900px; margin: auto; }
    .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; display: none; }
    .show { display: block; }
    input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; font-family: inherit; }
    button { background: var(--deep); color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
    
    /* ستايل محتويات الباقة */
    .sub-item-row { display: flex; gap: 10px; align-items: center; background: #fafafa; padding: 10px; border-radius: 8px; margin-bottom: 10px; border: 1px dashed #ccc; }
    .sub-item-row input { margin: 0; }
    .del-btn { background: #e74c3c; width: auto; padding: 10px 15px; margin: 0; }
    
    .product-list-item { background: #fff; border: 1px solid #eee; padding: 15px; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>

<nav id="adminNav" style="display:none;">
    <span onclick="switchTab('addProductTab', this)" class="active-tab">➕ إضافة باقة</span>
    <span onclick="switchTab('manageProductsTab', this)">📦 إدارة الباقات</span>
</nav>

<div class="container">
    <div id="loginCard" class="card show" style="text-align: center; max-width: 400px; margin: 100px auto;">
        <h2>لوحة تحكم Cosmo</h2>
        <input type="password" id="adminPass" placeholder="كلمة المرور (1234)">
        <button onclick="login()">دخول</button>
    </div>

    <div id="addProductTab" class="card">
        <h3>إنشاء باقة جديدة</h3>
        <input type="text" id="pName" placeholder="اسم الباقة (مثال: باقة العناية بالشعر)">
        <input type="number" id="pPrice" placeholder="السعر (ج.م)">
        <input type="text" id="pImg" placeholder="رابط صورة الباقة الأساسية (URL)">
        <textarea id="pDetails" placeholder="وصف الباقة (يستخدمه المساعد الذكي AI)"></textarea>

        <h4 style="margin-top:20px; color:var(--deep); border-bottom: 2px solid var(--gold); padding-bottom: 5px;">📦 محتويات الباقة (المنتجات الفرعية)</h4>
        <div id="subItemsContainer"></div>
        <button onclick="addSubItem()" style="background:var(--gold); color:#1a0a10; margin-bottom: 20px;">+ إضافة منتج للباقة</button>

        <button onclick="savePackage()" style="font-size: 1.1rem; padding: 15px;">💾 نشر الباقة في المتجر</button>
    </div>

    <div id="manageProductsTab" class="card">
        <h3>الباقات المتاحة في المتجر</h3>
        <div id="productsList">جاري التحميل...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBDUzmVCOB9HK_g5iB4wm_UAjw0jAvhr8k",
        authDomain: "cosmo-brand.firebaseapp.com",
        projectId: "cosmo-brand",
        storageBucket: "cosmo-brand.firebasestorage.app",
        messagingSenderId: "12821155095",
        appId: "1:12821155095:web:af55925a7914027f9a7b52"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function login() {
        if(document.getElementById('adminPass').value === "1234") {
            document.getElementById('loginCard').classList.remove('show');
            document.getElementById('adminNav').style.display = 'flex';
            switchTab('addProductTab', document.querySelector('nav span'));
            fetchProducts();
        } else { alert("كلمة المرور غير صحيحة!"); }
    }

    function switchTab(tabId, element) {
        document.querySelectorAll('.card').forEach(c => c.classList.remove('show'));
        document.querySelectorAll('nav span').forEach(s => s.classList.remove('active-tab'));
        document.getElementById(tabId).classList.add('show');
        element.classList.add('active-tab');
    }

    // إضافة منتج فرعي داخل الباقة
    function addSubItem() {
        const container = document.getElementById('subItemsContainer');
        const row = document.createElement('div');
        row.className = 'sub-item-row';
        row.innerHTML = `
            <input type="text" class="si-name" placeholder="اسم المنتج (مثال: سيروم الذهب)">
            <input type="text" class="si-img" placeholder="رابط صورة المنتج">
            <button class="del-btn" onclick="this.parentElement.remove()">❌</button>
        `;
        container.appendChild(row);
    }

    // حفظ الباقة في Firebase
    async function savePackage() {
        const name = document.getElementById('pName').value;
        const price = document.getElementById('pPrice').value;
        const imageUrl = document.getElementById('pImg').value;
        const details = document.getElementById('pDetails').value;

        if(!name || !price) return alert("يرجى إدخال اسم وسعر الباقة.");

        // تجميع المنتجات الفرعية
        const subItems = [];
        document.querySelectorAll('.sub-item-row').forEach(row => {
            const siName = row.querySelector('.si-name').value;
            const siImg = row.querySelector('.si-img').value;
            if(siName) subItems.push({ name: siName, img: siImg });
        });

        await db.collection("products").add({
            name, price, imageUrl, details, subItems, createdAt: new Date()
        });

        alert("تم رفع الباقة للمتجر بنجاح!");
        // تفريغ الحقول
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pImg').value = '';
        document.getElementById('pDetails').value = '';
        document.getElementById('subItemsContainer').innerHTML = '';
    }

    // عرض الباقات للحذف
    function fetchProducts() {
        db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const p = doc.data();
                html += `
                <div class="product-list-item">
                    <div><b>${p.name}</b> <br><small>${p.price} ج.م</small></div>
                    <button class="del-btn" onclick="deleteProduct('${doc.id}')">حذف</button>
                </div>`;
            });
            document.getElementById('productsList').innerHTML = html || 'لا توجد باقات.';
        });
    }

    async function deleteProduct(id) {
        if(confirm("هل أنت متأكد من حذف هذه الباقة؟")) {
            await db.collection("products").doc(id).delete();
        }
    }
</script>
</body>
</html>
