<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmo Brand | لوحة التحكم</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --deep:#8b3a5a; --gold:#c9a84c; --soft:#f5e6ea; }
        body { font-family: 'Tajawal', sans-serif; background: #fdf6f0; margin: 0; padding: 0; }
        
        /* الهيدر */
        nav { background: var(--deep); color: white; padding: 15px 5%; display: flex; justify-content: space-between; align-items: center; }
        .nav-btn { background: white; color: var(--deep); padding: 8px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; font-size: 0.9rem; }

        .container { padding: 30px 5%; max-width: 900px; margin: 0 auto; }
        
        /* تسجيل الدخول */
        #loginSection { background: white; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 50px; }
        
        /* نموذج الإضافة والتعديل */
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 30px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; }
        .submit-btn { width: 100%; padding: 15px; background: var(--deep); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .cancel-btn { width: 100%; padding: 10px; background: #eee; color: #666; border: none; border-radius: 10px; margin-top: 10px; cursor: pointer; display: none; }

        /* قائمة المنتجات */
        .product-item { background: white; padding: 15px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border: 1px solid #eee; }
        .item-info { display: flex; align-items: center; }
        .item-img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; margin-left: 15px; background: #fafafa; }
        .actions button { padding: 8px 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; margin-right: 5px; }
        .edit-btn { background: #e3f2fd; color: #1976d2; }
        .del-btn { background: #ffebee; color: #d32f2f; }
    </style>
</head>
<body>

<nav>
    <div style="font-weight: bold; font-size: 1.2rem;">لوحة تحكم Cosmo Brand</div>
    <a href="index.html" class="nav-btn">عرض المتجر 🌐</a>
</nav>

<div class="container">
    <div id="loginSection">
        <h2>🔐 دخول الإدارة</h2>
        <input id="adminPass" type="password" placeholder="أدخل كلمة المرور">
        <button class="submit-btn" onclick="checkLogin()">دخول</button>
    </div>

    <div id="adminPanel" style="display:none;">
        <div class="card">
            <h3 id="formTitle">➕ إضافة باقة جديدة</h3>
            <input id="pName" placeholder="اسم الباقة (مثلاً: باقة العناية الفائقة)">
            <input id="pPrice" type="number" placeholder="السعر (ج.م)">
            <input id="pImg" placeholder="رابط صورة المنتج (URL)">
            <textarea id="pDetails" placeholder="تفاصيل الباقة (هذه التفاصيل هي ما يقرأه مساعد الـ AI ليرشح الباقة للعميل)" rows="4"></textarea>
            
            <button id="mainBtn" class="submit-btn" onclick="handleSubmission()">نشر الباقة الآن</button>
            <button id="cancelBtn" class="cancel-btn" onclick="resetForm()">إلغاء التعديل</button>
        </div>

        <div class="card">
            <h3>📋 الباقات الحالية في المتجر</h3>
            <div id="productsList">جاري التحميل...</div>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBDUzmVCOB9HK_g5iB4wm_UAjw0jAvhr8k",
        authDomain: "cosmo-brand.firebaseapp.com",
        projectId: "cosmo-brand",
        storageBucket: "cosmo-brand.firebasestorage.app",
        messagingSenderId: "12821155095",
        appId: "1:12821155095:web:af55925a7914027f9a7b52"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let editingId = null; // متغير لحفظ آيدي الباقة التي يتم تعديلها

    function checkLogin() {
        const pass = document.getElementById('adminPass').value;
        if(pass === "1234") { // يمكنك تغيير كلمة السر هنا
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminPanel').style.display = 'block';
            loadProducts();
        } else {
            alert("كلمة المرور غير صحيحة!");
        }
    }

    // دالة واحدة للتعامل مع الإضافة أو التعديل (إصلاح مشكلة زر التعديل)
    async function handleSubmission() {
        const name = document.getElementById('pName').value;
        const price = Number(document.getElementById('pPrice').value);
        const imageUrl = document.getElementById('pImg').value;
        const details = document.getElementById('pDetails').value;

        if(!name || !price) return alert("يرجى ملء الاسم والسعر على الأقل");

        document.getElementById('mainBtn').innerText = "جاري الحفظ...";

        try {
            if (editingId) {
                // وضع التعديل: تحديث الباقة الموجودة
                await db.collection("products").doc(editingId).update({
                    name, price, imageUrl, details
                });
                alert("✅ تم تحديث الباقة بنجاح!");
            } else {
                // وضع الإضافة: إضافة باقة جديدة
                await db.collection("products").add({
                    name, price, imageUrl, details, createdAt: new Date()
                });
                alert("✅ تم نشر الباقة الجديدة!");
            }
            resetForm();
        } catch (e) {
            alert("❌ حدث خطأ: " + e.message);
        }
        document.getElementById('mainBtn').innerText = editingId ? "تحديث الباقة الآن" : "نشر الباقة الآن";
    }

    function loadProducts() {
        db.collection("products").orderBy("createdAt", "desc").onSnapshot(snap => {
            let html = '';
            snap.forEach(doc => {
                const p = doc.data();
                html += `
                <div class="product-item">
                    <div class="item-info">
                        <img src="${p.imageUrl || 'https://via.placeholder.com/150'}" class="item-img">
                        <div>
                            <b>${p.name}</b><br>
                            <small>${p.price} ج.م</small>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="edit-btn" onclick="startEdit('${doc.id}', '${p.name}', ${p.price}, '${p.imageUrl}', \`${p.details || ''}\`)">تعديل</button>
                        <button class="del-btn" onclick="deleteItem('${doc.id}')">حذف</button>
                    </div>
                </div>`;
            });
            document.getElementById('productsList').innerHTML = html || 'لا توجد باقات حالياً';
        });
    }

    // وظيفة بدء التعديل
    function startEdit(id, name, price, img, details) {
        editingId = id;
        document.getElementById('pName').value = name;
        document.getElementById('pPrice').value = price;
        document.getElementById('pImg').value = img;
        document.getElementById('pDetails').value = details;
        
        document.getElementById('formTitle').innerText = "✏️ تعديل الباقة الحالية";
        document.getElementById('mainBtn').innerText = "تحديث الباقة الآن";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // إعادة ضبط النموذج بعد النجاح أو الإلغاء
    function resetForm() {
        editingId = null;
        document.getElementById('pName').value = '';
        document.getElementById('pPrice').value = '';
        document.getElementById('pImg').value = '';
        document.getElementById('pDetails').value = '';
        document.getElementById('formTitle').innerText = "➕ إضافة باقة جديدة";
        document.getElementById('mainBtn').innerText = "نشر الباقة الآن";
        document.getElementById('cancelBtn').style.display = "none";
    }

    async function deleteItem(id) {
        if(confirm("هل أنت متأكد من حذف هذه الباقة نهائياً؟")) {
            await db.collection("products").doc(id).delete();
        }
    }
</script>
</body>
</html>
